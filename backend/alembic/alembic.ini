# Alembic configuration for Kinochi backend

[alembic]
# Path to migration scripts — relative to this file's directory
script_location = %(here)s
# Use the async SQLAlchemy engine
sqlalchemy.url = postgresql+asyncpg://kinochi:kinochi_secret@localhost:5432/kinochi

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
