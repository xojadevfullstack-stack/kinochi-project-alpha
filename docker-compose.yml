# Root docker-compose.yml — Kinochi local development environment
# Phase 0: Postgres 16 + Redis 7 + Backend skeleton

version: "3.9"

services:
  # ── PostgreSQL 16 ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: kinochi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kinochi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-kinochi}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kinochi}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis 7 ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kinochi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend (FastAPI) ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kinochi-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/.venv
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-kinochi}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kinochi}
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
